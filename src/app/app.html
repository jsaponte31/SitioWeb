<div id="tsparticles"></div>

<button class="theme-toggle" [class.shake]="shakeToggle()" (click)="toggleDarkMode()" [attr.aria-label]="darkMode() ? 'Modo claro' : 'Modo oscuro'" (animationend)="shakeToggle.set(false)">
  <i class="bi" [class.bi-moon-fill]="!darkMode()" [class.bi-sun-fill]="darkMode()"></i>
</button>

<button class="scroll-top" [class.visible]="showScrollTop()" (click)="scrollToTop()" aria-label="Volver arriba">
  <i class="bi bi-arrow-up"></i>
</button>

<app-navbar></app-navbar>

<div class="app-container" [class.dark-mode]="darkMode()">
  <main class="content-wrapper">
    <router-outlet></router-outlet>
  </main>

  <app-footer></app-footer>
</div>
